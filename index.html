<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>里程票比价工具 V3</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);min-height:100vh;padding:20px;color:#e0e0e0}
.container{max-width:1000px;margin:0 auto}
h1{color:#fff;text-align:center;margin-bottom:8px;font-size:28px}
.subtitle{text-align:center;color:#888;font-size:13px;margin-bottom:24px}
.card{background:#1e293b;border-radius:12px;padding:24px;margin-bottom:16px;border:1px solid #334155}
.form-group{margin-bottom:16px}
label{display:block;margin-bottom:6px;font-weight:600;color:#94a3b8;font-size:13px}
select,input{width:100%;padding:10px 14px;border:1px solid #475569;border-radius:8px;font-size:14px;background:#0f172a;color:#e0e0e0}
select:focus,input:focus{outline:none;border-color:#3b82f6;box-shadow:0 0 0 2px rgba(59,130,246,0.2)}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.btn{width:100%;padding:12px;background:linear-gradient(135deg,#3b82f6,#8b5cf6);color:white;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;transition:all 0.2s}
.btn:hover{transform:translateY(-1px);box-shadow:0 4px 15px rgba(59,130,246,0.4)}
.btn:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.btn-row{display:flex;gap:10px}
.btn-secondary{background:linear-gradient(135deg,#475569,#64748b)}
.swap-btn{background:none;border:1px solid #3b82f6;color:#3b82f6;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:13px}
.swap-btn:hover{background:#3b82f6;color:white}
.result{display:none}
.result.show{display:block}
.section-title{font-size:15px;font-weight:700;color:#3b82f6;margin:16px 0 10px;display:flex;align-items:center;gap:6px}
table{width:100%;border-collapse:collapse;margin-top:8px;font-size:13px}
th{background:#0f172a;padding:10px 8px;text-align:left;font-size:12px;color:#64748b;text-transform:uppercase;letter-spacing:0.5px}
td{padding:10px 8px;border-bottom:1px solid #1e293b}
tr:hover{background:rgba(59,130,246,0.05)}
.profit{font-weight:700}
.positive{color:#10b981}
.negative{color:#ef4444}
.zero{color:#f59e0b}
.badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600}
.badge-green{background:rgba(16,185,129,0.15);color:#10b981}
.badge-red{background:rgba(239,68,68,0.15);color:#ef4444}
.badge-yellow{background:rgba(245,158,11,0.15);color:#f59e0b}
.badge-blue{background:rgba(59,130,246,0.15);color:#3b82f6}
.tips{background:rgba(59,130,246,0.08);border-left:3px solid #3b82f6;padding:12px;border-radius:0 8px 8px 0;margin-top:16px;font-size:13px;color:#94a3b8;line-height:1.6}
.loading{display:inline-block;width:16px;height:16px;border:2px solid #475569;border-top-color:#3b82f6;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.route-info{display:flex;gap:16px;flex-wrap:wrap;margin:10px 0;font-size:13px;color:#94a3b8}
.route-info span{background:#0f172a;padding:4px 10px;border-radius:6px}
.tab-row{display:flex;gap:4px;margin-bottom:12px}
.tab{padding:6px 16px;border-radius:6px 6px 0 0;cursor:pointer;font-size:13px;background:#0f172a;color:#64748b;border:1px solid #334155;border-bottom:none}
.tab.active{background:#1e293b;color:#3b82f6;border-color:#3b82f6}
.hidden{display:none}
.api-status{text-align:center;font-size:12px;margin-top:8px}
.api-status.ok{color:#10b981}
.api-status.err{color:#ef4444}
@media(max-width:600px){.row,.row3{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="container">
  <h1>✈️ 里程票比价工具 V3</h1>
  <p class="subtitle">飞猪FlyAI实时价格 · 南航+川航 · 利润自动计算</p>

  <div class="card">
    <div class="row">
      <div class="form-group">
        <label>出发城市</label>
        <select id="dep"></select>
      </div>
      <div class="form-group">
        <label>到达城市</label>
        <select id="arr"></select>
      </div>
    </div>
    <div style="text-align:center;margin:-8px 0 8px">
      <button class="swap-btn" onclick="swapCities()">🔄 交换</button>
    </div>
    <div class="row3">
      <div class="form-group">
        <label>出发日期</label>
        <input type="date" id="date">
      </div>
      <div class="form-group">
        <label>人数（成人）</label>
        <input type="number" id="pax" value="1" min="1" max="9">
      </div>
      <div class="form-group">
        <label>后端API地址</label>
        <input type="text" id="apiUrl" value="http://localhost:8897" placeholder="http://localhost:8897">
      </div>
    </div>
    <div class="btn-row" style="margin-top:8px">
      <button class="btn" id="btnSearch" onclick="searchSingle()">🔍 查询比价</button>
    </div>
    <div id="loading" style="display:none;text-align:center;padding:16px;">
      <span class="loading"></span> 正在查询实时价格...
    </div>
    <div id="apiStatus" class="api-status"></div>
  </div>

  <!-- 结果区 -->
  <div class="card result" id="resultSingle">
    <div class="section-title">📋 查询结果</div>
    <div class="route-info" id="routeInfo"></div>

    <table>
      <thead><tr>
        <th>航班</th><th>航司</th><th>时间</th><th>经济舱价</th><th>公务舱价</th>
      </tr></thead>
      <tbody id="flightBody"></tbody>
    </table>

    <div class="section-title" style="margin-top:20px">💰 出票成本对比</div>
    <table>
      <thead><tr>
        <th>航班</th><th>出票方式</th><th>里程需求</th><th>成本/人</th><th>经济舱利润</th><th>判断</th>
      </tr></thead>
      <tbody id="costBody"></tbody>
    </table>

    <div class="tips" id="tips"></div>
  </div>
</div>

<script>
const CITIES = [
  {code:"CTU",name:"成都"},{code:"PEK",name:"北京首都"},{code:"PKX",name:"北京大兴"},
  {code:"SHA",name:"上海虹桥"},{code:"PVG",name:"上海浦东"},{code:"CAN",name:"广州"},
  {code:"SZX",name:"深圳"},{code:"CKG",name:"重庆"},{code:"KMG",name:"昆明"},
  {code:"XIY",name:"西安"},{code:"HGH",name:"杭州"},{code:"WUH",name:"武汉"},
  {code:"NKG",name:"南京"},{code:"CSX",name:"长沙"},{code:"TAO",name:"青岛"},
  {code:"DLC",name:"大连"},{code:"TSN",name:"天津"},{code:"XMN",name:"厦门"},
  {code:"FOC",name:"福州"},{code:"HAK",name:"海口"},{code:"SYX",name:"三亚"},
  {code:"CGO",name:"郑州"},{code:"TYN",name:"太原"},{code:"SHE",name:"沈阳"},
  {code:"HRB",name:"哈尔滨"},{code:"URC",name:"乌鲁木齐"},{code:"LHW",name:"兰州"},
  {code:"KWE",name:"贵阳"},{code:"TNA",name:"济南"},{code:"NNG",name:"南宁"},
  {code:"KWL",name:"桂林"},{code:"HFE",name:"合肥"},
];

function initSelects(){
  const dep=document.getElementById('dep'),arr=document.getElementById('arr');
  CITIES.forEach(c=>{
    dep.innerHTML+=`<option value="${c.code}">${c.name}(${c.code})</option>`;
    arr.innerHTML+=`<option value="${c.code}">${c.name}(${c.code})</option>`;
  });
  dep.value="CTU";arr.value="SYX";
  const tmr=new Date();tmr.setDate(tmr.getDate()+1);
  document.getElementById('date').value=tmr.toISOString().split('T')[0];
}

function swapCities(){
  const d=document.getElementById('dep'),a=document.getElementById('arr');
  [d.value,a.value]=[a.value,d.value];
}

function getCity(code){return CITIES.find(c=>c.code===code);}

function getStatusClass(pct){
  if(pct>10)return'positive';
  if(pct<-10)return'negative';
  return'zero';
}
function getBadgeClass(pct){
  if(pct>10)return'badge-green';
  if(pct<-10)return'badge-red';
  return'badge-yellow';
}
function getBadgeText(pct){
  if(pct>10)return'可卖';
  if(pct<-10)return'亏损';
  return'持平';
}

async function searchSingle(){
  const depCode=document.getElementById('dep').value;
  const arrCode=document.getElementById('arr').value;
  const dateStr=document.getElementById('date').value;
  const pax=parseInt(document.getElementById('pax').value)||1;
  const apiUrl=document.getElementById('apiUrl').value.replace(/\/$/,'');

  if(depCode===arrCode){alert('出发和到达不能相同！');return;}

  document.getElementById('loading').style.display='block';
  document.getElementById('btnSearch').disabled=true;
  document.getElementById('apiStatus').className='api-status';
  document.getElementById('apiStatus').textContent='';

  try{
    const url=`${apiUrl}/api/flights?origin=${depCode}&dest=${arrCode}&date=${dateStr}`;
    const resp=await fetch(url,{signal:AbortSignal.timeout(15000)});
    if(!resp.ok)throw new Error(`HTTP ${resp.status}`);
    const data=await resp.json();

    // 显示航班列表
    const flightBody=document.getElementById('flightBody');
    flightBody.innerHTML='';
    const flights=data.flights||[];
    flights.forEach(f=>{
      const ecoPrice=f.cabins?.economy?.ctrip_price||f.ctrip_price||0;
      const bizPrice=f.cabins?.business?.ctrip_price||0;
      flightBody.innerHTML+=`<tr>
        <td><strong>${f.flight_no||'—'}</strong></td>
        <td>${f.airline||''}</td>
        <td>${f.dep_time||''} - ${f.arr_time||''}</td>
        <td>¥${ecoPrice}</td>
        <td>${bizPrice?'¥'+bizPrice:'—'}</td>
      </tr>`;
    });

    // 显示成本对比
    const costBody=document.getElementById('costBody');
    costBody.innerHTML='';
    flights.forEach(f=>{
      const eco=f.cabins?.economy;
      if(!eco)return;
      const costs=eco.costs||{};
      const profits=eco.profit||{};
      for(const[key,cost]of Object.entries(costs)){
        const profit=profits[key]||0;
        const profitPax=profit/pax;
        const pct=cost.cost_per_pax?Math.round(profitPax/cost.cost_per_pax*100):0;
        costBody.innerHTML+=`<tr>
          <td><strong>${f.flight_no||'—'}</strong></td>
          <td><span class="badge badge-blue">${cost.label||key}</span></td>
          <td>${eco.miles_required?.toLocaleString()||'—'}</td>
          <td>¥${cost.cost_per_pax||0}</td>
          <td class="profit ${getStatusClass(pct)}">¥${profitPax>0?'+':''}${profitPax}</td>
          <td><span class="badge ${getBadgeClass(pct)}">${getBadgeText(pct)}</span></td>
        </tr>`;
      }
    });

    // 路线信息
    const route=data.route||{};
    document.getElementById('routeInfo').innerHTML=`
      <span>📍 ${route.origin||''} → ${route.dest||''}</span>
      <span>📏 ${route.distance||0}km</span>
      <span>📅 ${route.date||''}</span>
      <span>👥 ${pax}人</span>
      <span>✈️ ${flights.length}个航班</span>
    `;

    // 提示
    document.getElementById('tips').innerHTML=`
      💡 数据来源：飞猪FlyAI实时价格 | 距离：${route.distance||0}km<br>
      南航经济舱需${data.mileage_standards?.cz?.economy?.toLocaleString()||'—'}里程，川航需${data.mileage_standards?.u3?.economy?.toLocaleString()||'—'}里程<br>
      川航里程兑南航航班按川航标准执行、秒出；南航里程兑川航航班需等15天。
    `;

    document.getElementById('resultSingle').classList.add('show');
    document.getElementById('apiStatus').className='api-status ok';
    document.getElementById('apiStatus').textContent='✅ 查询成功';
    document.getElementById('resultSingle').scrollIntoView({behavior:'smooth'});

  }catch(e){
    document.getElementById('apiStatus').className='api-status err';
    document.getElementById('apiStatus').textContent=`❌ 查询失败: ${e.message}`;
    alert('查询失败: '+e.message+'\n请确认后端API已启动');
  }finally{
    document.getElementById('loading').style.display='none';
    document.getElementById('btnSearch').disabled=false;
  }
}

initSelects();
</script>
</body>
</html>
